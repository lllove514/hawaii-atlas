<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lava Flow History of Hawaiʻi Island</title>
<link rel="stylesheet" href="../shared/atlas.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="map" width="10" height="10" role="img" aria-label="Animated map of lava flows on Hawaiʻi Island, coloured by age"></canvas>

    <div id="titlecard" class="panel">
      <a class="atlas-home" href="../">Hawaiʻi Atlas</a>
      <h1>Lava Flow History of Hawaiʻi Island</h1>
      <p>Younger flows bury older ones as the island’s surface rebuilds,
         oldest to newest.</p>
    </div>

    <div id="legendbox" class="panel">
      <div class="modes seg" id="modes">
        <button data-mode="age" class="on">Age</button>
        <button data-mode="volcano">Volcano</button>
      </div>
      <div id="legend-age">
        <div id="colorbar"></div>
        <div id="colorbar-ticks"></div>
      </div>
      <div id="legend-volcano" hidden></div>
    </div>

    <div id="readout" hidden></div>

    <div id="hud" class="panel">
      <div id="caption">—</div>
      <div id="statline">
        <span id="frontier">—</span>
        <span id="area">—</span>
      </div>
      <div id="transport">
        <button id="play" aria-label="play">▶</button>
        <input id="slider" class="scrub" type="range" min="1" max="1" value="1" step="1"
               aria-label="time">
        <label class="ctl">Speed
          <select id="speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </label>
        <button id="loop" class="toggle" aria-pressed="false">Loop</button>
      </div>
      <div id="jumps">
        <span class="grouplabel">Jump</span>
        <button data-jump="oldest">All time</button>
        <button data-jump="1000">Last 1,000 yrs</button>
        <button data-jump="historic">Historic era</button>
        <span class="sep"></span>
        <span class="grouplabel">Landmarks</span>
        <span id="landmarks"></span>
      </div>
    </div>
  </div>
  <footer id="credit">data loading…</footer>
</div>
<script src="app.js"></script>
</body>
</html>
